<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Product preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
  <link rel="stylesheet" href="./style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>  
  <main class="card">
  <div class="product-image">
    <img src="images/image-product-desktop.jpg" alt="Perfume Product">
  </div>

  <div class="product-content">
    <p class="category">PERFUME</p>
    <h1>Gabrielle Essence Eau de parfum</h1>
    <p class="description">A solar, voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL. </p>
    
    <div class="price-section">
      <span class="new-price">$149.99</span>
      <span class="old-price">$169.99</span>
    </div>

    <button>Add to Cart</button>
  </div>
</main>
</body>
</html>
